<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xếp chỗ Pony</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffe6f2, #ffb3d9, #b3e6ff);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            justify-content: center;
        }
        .header-container { text-align: center; margin-bottom: 5px; }
        h1 { color: #ff4d94; text-shadow: 2px 2px white; margin: 0; font-size: 24px; font-weight: bold; }
        .level-badge {
            background: #ff4d94; color: white; padding: 5px 15px;
            border-radius: 15px; font-size: 16px; font-weight: bold;
            display: inline-block; margin-top: 5px; box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }
        
        /* BẢN ĐỒ CHỌN MÀN (LEVEL MAP) */
        .map-title { color: #ff3399; font-weight: bold; font-size: 14px; margin-top: 15px; margin-bottom: 5px; }
        .level-map {
            display: flex;
            gap: 8px;
            max-width: 95%;
            overflow-x: auto;
            padding: 10px 5px;
            scrollbar-width: none;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 20px;
            box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
        }
        .level-map::-webkit-scrollbar { display: none; }
        
        .map-node {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #ccc;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            cursor: not-allowed;
            flex-shrink: 0;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
            transition: all 0.2s;
            border: 2px solid white;
        }
        /* Màn đã mở khóa */
        .map-node.unlocked {
            background: linear-gradient(135deg, #ff99cc, #ff4d94);
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(255, 77, 148, 0.3);
        }
        .map-node.unlocked:active { transform: scale(0.9); }
        /* Màn bé đang chọn chơi hiện tại */
        .map-node.active {
            background: linear-gradient(135deg, #00ecd4, #00bcd4);
            box-shadow: 0 0 10px #00bcd4;
            transform: scale(1.1);
        }
        
        /* KHUNG LỌ THỦY TINH */
        #game-container { 
            display: flex; 
            gap: 10px; 
            justify-content: flex-start;
            flex-wrap: nowrap;
            margin-top: 15px; 
            max-width: 100%;
            overflow-x: auto;
            padding: 20px 15px;
            scrollbar-width: none;
        }
        #game-container::-webkit-scrollbar { display: none; }
        
        .column {
            position: relative;
            width: 70px;
            height: 270px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.5), rgba(255, 255, 255, 0.85));
            border: 4px solid #ffb3d9;
            border-radius: 12px 12px 25px 25px; 
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding: 15px 3px 15px 3px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.6), 0 6px 12px rgba(255, 77, 148, 0.15);
            flex-shrink: 0;
        }
        .column::before { content: "💝"; position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 18px; z-index: 2; }
        .column::after { content: ""; position: absolute; top: -6px; width: 45px; height: 8px; background: #ff99cc; border-radius: 4px; border: 2px solid #ffb3d9; }

        .column.selected { 
            border-color: #ff3399; 
            background: linear-gradient(to bottom, rgba(255, 230, 242, 0.6), rgba(255, 204, 230, 0.9));
            box-shadow: 0 0 20px rgba(255, 51, 153, 0.6); 
            animation: tilt 0.5s infinite alternate ease-in-out;
        }
        .column.selected .moving-group { transform: translateY(-10px); filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }
        
        @keyframes tilt { 0% { transform: translateY(-5px) rotate(-2deg); } 100% { transform: translateY(-5px) rotate(2deg); } }

        /* Ô TRÒN CHỨA ICON PONY */
        .pony-card {
            width: 52px;
            height: 52px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 3px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: 2px solid #ffccd5;
            z-index: 1;
            transition: transform 0.2s ease;
        }
        .pony-card svg { width: 82%; height: 82%; }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        /* BẢNG CHIẾN THẮNG */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(255, 77, 148, 0.3); text-align: center; z-index: 10;
            width: 85%; max-width: 350px;
            border: 4px solid #ffccd5;
        }
        .modal h2 { color: #ff4d94; margin-top: 0; font-size: 26px; }
        
        button {
            background: linear-gradient(135deg, #ff66b2, #ff3399); 
            color: white; border: none; padding: 12px 30px;
            font-size: 18px; border-radius: 25px; cursor: pointer; margin-top: 15px;
            box-shadow: 0 5px #b30059; font-weight: bold;
        }
        button:active { box-shadow: 0 2px #b30059; transform: translateY(3px); }
        
        .clear-data-btn {
            background: none; color: #ff80aa; border: none; font-size: 11px; text-decoration: underline; cursor: pointer; margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🦄 Xếp chỗ cho các Pony đáng yêu 🦄</h1>
        <div class="level-badge" id="level-display">Màn 1</div>
    </div>
    
    <div class="map-title">🗺️ Bản đồ thế giới Pony của bé:</div>
    <div class="level-map" id="level-map-container"></div>
    
    <div id="game-container"></div>

    <div id="win-message" class="modal">
        <h2>🎉 Xuất sắc quá! 🎉</h2>
        <p>Bé đã hoàn thành màn chơi này rồi!</p>
        <button onclick="nextLevel()">Chơi Màn Tiếp Theo</button>
    </div>

    <div id="victory-message" class="modal">
        <h2>👑 Công Chúa Pony! 👑</h2>
        <p>Bé quá thông minh! Bé đã chiến thắng toàn bộ 10 màn chơi!</p>
        <button onclick="closeVictoryModal()">Xem lại Bản đồ màn</button>
    </div>

    <script>
        const PONIES_POOL = [
            { id: 'twilight', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#D19FEF"/><path d="M20,30 Q50,5 80,30 Q65,65 50,85 Q35,65 20,30" fill="#283593"/><path d="M35,20 Q50,5 65,20 Q55,50 50,75" fill="#E91E63"/><polygon points="50,15 53,25 62,25 55,31 57,40 50,35 43,40 45,31 38,25 47,25" fill="#FFFFFF"/></svg>` },
            { id: 'pinkie', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFB7D5"/><path d="M20,40 Q50,-10 80,40 Q95,70 50,90 Q5,70 20,40" fill="#FF4081"/><circle cx="40" cy="35" r="8" fill="#FF4081"/><circle cx="60" cy="45" r="10" fill="#FF4081"/><circle cx="35" cy="60" r="7" fill="#FF4081"/></svg>` },
            { id: 'rainbow', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#B3E5FC"/><path d="M15,40 Q50,0 85,40 L75,80 L25,80 Z" fill="#FF1744"/><path d="M25,45 Q50,15 75,45 L70,80 L30,80 Z" fill="#FFFF00"/><path d="M35,50 Q50,30 65,50 L60,80 L40,80 Z" fill="#00E676"/><path d="M45,55 Q50,45 55,55 L53,80 L47,80 Z" fill="#2979FF"/><polygon points="30,55 45,55 35,70 50,70 40,90 60,65 48,65" fill="#FFFFFF"/></svg>` },
            { id: 'fluttershy', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFF59D"/><path d="M15,30 Q50,5 85,40 Q70,95 30,85" fill="#F48FB1"/><path d="M40,50 Q60,35 70,55" fill="none" stroke="#F48FB1" stroke-width="5" stroke-linecap="round"/><circle cx="35" cy="45" r="5" fill="#64B5F6"/></svg>` },
            { id: 'rarity', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#F5F5F5"/><path d="M30,25 Q60,5 80,35 Q60,75 40,55" fill="#4A148C"/><path d="M45,45 Q65,35 55,65" fill="none" stroke="#4A148C" stroke-width="4"/><polygon points="50,10 55,25 45,25" fill="#D19FEF" stroke="#4A148C" stroke-width="2"/></svg>` },
            { id: 'applejack', svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFB74D"/><path d="M10,40 Q50,20 90,40 L80,50 L20,50 Z" fill="#F57C00"/><path d="M25,40 L25,15 Q50,5 75,15 L75,40 Z" fill="#A1887F"/><circle cx="35" cy="70" r="7" fill="#D50000"/><circle cx="65" cy="70" r="7" fill="#D50000"/><circle cx="50" cy="82" r="7" fill="#D50000"/></svg>` }
        ];

        const COL_CAPACITY = 4;
        let currentLevel = 1; // Màn bé đang chơi hiện tại
        let maxLevel = 1;     // Màn cao nhất bé đã từng mở khóa được
        let selectedColIndex = null;
        let columnsData = [];

        // Đọc dữ liệu đã lưu trong máy
        if (localStorage.getItem('pony_max_level')) {
            maxLevel = parseInt(localStorage.getItem('pony_max_level'));
        }
        if (localStorage.getItem('pony_current_level')) {
            currentLevel = parseInt(localStorage.getItem('pony_current_level'));
        } else {
            currentLevel = maxLevel; // Nếu mới mở máy, cho chơi tiếp màn cao nhất
        }

        function initGame() {
            document.getElementById('win-message').style.display = 'none';
            document.getElementById('victory-message').style.display = 'none';
            document.getElementById('level-display').innerText = `Màn ${currentLevel}`;
            selectedColIndex = null;
            
            // Vẽ lại bản đồ màn chơi
            renderMap();

            // Tính số lượng lọ dựa theo màn hiện tại đang chọn chơi
            let fullColsCount = Math.min(2 + (currentLevel - 1), 6); 
            let emptyColsCount = Math.min(1 + (currentLevel - 1), 4); 

            let activePonies = [...PONIES_POOL].sort(() => Math.random() - 0.5).slice(0, fullColsCount);
            let pool = [];
            activePonies.forEach(p => {
                for(let i = 0; i < COL_CAPACITY; i++) pool.push({ ...p });
            });
            pool.sort(() => Math.random() - 0.5);

            columnsData = [];
            for (let i = 0; i < fullColsCount; i++) {
                columnsData.push(pool.slice(i * COL_CAPACITY, (i + 1) * COL_CAPACITY));
            }
            for (let i = 0; i < emptyColsCount; i++) {
                columnsData.push([]); 
            }

            render();
        }

        // HÀM VẼ BẢN ĐỒ CHỌN MÀN (LEVEL MAP)
        function renderMap() {
            const mapContainer = document.getElementById('level-map-container');
            mapContainer.innerHTML = '';

            for (let i = 1; i <= 10; i++) {
                const node = document.createElement('div');
                node.className = 'map-node';
                
                if (i <= maxLevel) {
                    node.classList.add('unlocked');
                    node.innerText = i;
                    // Khi bé bấm vào nút màn cũ, game chuyển sang màn đó ngay
                    node.onclick = () => {
                        currentLevel = i;
                        localStorage.setItem('pony_current_level', currentLevel);
                        initGame();
                    };
                } else {
                    node.innerText = '🔒'; // Hiện ổ khóa nếu chưa chơi tới
                }

                if (i === currentLevel) {
                    node.classList.add('active');
                }

                mapContainer.appendChild(node);
            }
        }

        function getMovingGroupSize(col) {
            if (col.length === 0) return 0;
            let size = 1;
            let targetId = col[col.length - 1].id;
            for (let i = col.length - 2; i >= 0; i--) {
                if (col[i].id === targetId) { size++; } else { break; }
            }
            return size;
        }

        function render() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            columnsData.forEach((col, index) => {
                const colDiv = document.createElement('div');
                colDiv.className = `column ${selectedColIndex === index ? 'selected' : ''}`;
                colDiv.onclick = () => handleColumnClick(index);

                let movingSize = (selectedColIndex === index) ? getMovingGroupSize(col) : 0;
                let startMovingIdx = col.length - movingSize;

                col.forEach((pony, ponyIdx) => {
                    const ponyDiv = document.createElement('div');
                    ponyDiv.className = 'pony-card';
                    if (ponyIdx >= startMovingIdx) { ponyDiv.classList.add('moving-group'); }
                    ponyDiv.innerHTML = pony.svg;
                    colDiv.appendChild(ponyDiv);
                });

                container.appendChild(colDiv);
            });
        }

        function handleColumnClick(index) {
            if (selectedColIndex === null) {
                if (columnsData[index].length > 0) { selectedColIndex = index; }
            } else {
                if (selectedColIndex !== index) { movePonyGroup(selectedColIndex, index); }
                selectedColIndex = null;
            }
            render();
            checkWin();
        }

        function movePonyGroup(fromIdx, toIdx) {
            let fromCol = columnsData[fromIdx];
            let toCol = columnsData[toIdx];

            if (fromCol.length === 0 || toCol.length >= COL_CAPACITY) return; 

            let topPony = fromCol[fromCol.length - 1];

            if (toCol.length === 0 || toCol[toCol.length - 1].id === topPony.id) {
                let groupSize = getMovingGroupSize(fromCol);
                let availableSpace = COL_CAPACITY - toCol.length;
                let amountToMove = Math.min(groupSize, availableSpace);
                
                let movingPonies = fromCol.splice(fromCol.length - amountToMove, amountToMove);
                columnsData[toIdx] = toCol.concat(movingPonies);
            }
        }

        function checkWin() {
            let isWin = columnsData.every(col => {
                if (col.length === 0) return true;
                if (col.length === COL_CAPACITY) {
                    return col.every(pony => pony.id === col[0].id);
                }
                return false;
            });

            if (isWin) {
                setTimeout(() => {
                    // Nếu bé đang chơi màn cao nhất bé có, mở khóa màn tiếp theo
                    if (currentLevel === maxLevel && maxLevel < 10) {
                        maxLevel++;
                        localStorage.setItem('pony_max_level', maxLevel);
                    }
                    
                    if (currentLevel === 10) {
                        document.getElementById('victory-message').style.display = 'block';
                    } else {
                        document.getElementById('win-message').style.display = 'block';
                    }
                }, 300);
            }
        }

        function nextLevel() {
            currentLevel++;
            localStorage.setItem('pony_current_level', currentLevel);
            initGame();
        }

        function closeVictoryModal() {
            document.getElementById('victory-message').style.display = 'none';
            renderMap();
        }

        // Nút xóa dữ liệu để ba chơi thử từ đầu nếu muốn
        function clearAllData() {
            if (confirm('Ba có chắc chắn muốn xóa hết màn đã qua của bé để chơi lại từ Màn 1 không?')) {
                localStorage.clear();
                currentLevel = 1;
                maxLevel = 1;
                initGame();
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        initGame();
    </script>
    
    <button class="clear-data-btn" onclick="clearAllData()">Chơi lại từ đầu (Xóa toàn bộ màn đã qua)</button>
</body>
</html>
