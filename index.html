<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pony Sorting Game</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffe6f2, #ffb3d9, #b3e6ff);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: #ff4d94; text-shadow: 2px 2px white; margin-bottom: 5px; font-size: 22px; text-align: center; }
        #game-container { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 15px; max-width: 500px; }
        .column {
            width: 75px;
            height: 280px;
            background: rgba(255, 255, 255, 0.7);
            border: 3px dashed #ff99cc;
            border-radius: 15px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding: 10px 5px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .column.selected { border-color: #00bcd4; transform: scale(1.05); background: rgba(224, 247, 250, 0.9); box-shadow: 0 8px 15px rgba(0,188,212,0.3); }
        .pony-card {
            width: 55px;
            height: 55px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4px 0;
            box-shadow: 0 3px 5px rgba(0,0,0,0.1);
            animation: pop 0.3s ease;
            overflow: hidden;
            border: 2px solid #ffccd5;
        }
        .pony-card img {
            width: 85%;
            height: 85%;
            object-fit: contain;
        }
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        #win-message {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); text-align: center; z-index: 10;
            width: 85%; max-width: 350px;
        }
        #win-message h2 { color: #ff4d94; margin-top: 0; }
        button {
            background: #ff4d94; color: white; border: none; padding: 12px 25px;
            font-size: 18px; border-radius: 25px; cursor: pointer; margin-top: 15px;
            box-shadow: 0 4px #cc0066; font-weight: bold;
        }
        button:active { box-shadow: 0 2px #cc0066; transform: translateY(2px); }
    </style>
</head>
<body>

    <h1>🦄 Pony Sắp Xếp Đáng Yêu 🦄</h1>
    <div id="game-container"></div>

    <div id="win-message">
        <h2>🎉 Bé giỏi quá! 🎉</h2>
        <p>Các bạn My Little Pony đã về đúng nhà rồi!</p>
        <button onclick="initGame()">Chơi tiếp nha</button>
    </div>

    <script>
        // Danh sách hình ảnh chuẩn 6 nhân vật chính trong My Little Pony từ trang dữ liệu uy tín
        const PONIES = [
            { id: 'twilight', img: 'https://images.wikia.com/mlp/images/b/bc/Twilight_Sparkle_id.png' },
            { id: 'pinkie', img: 'https://images.wikia.com/mlp/images/b/b2/Pinkie_Pie_id.png' },
            { id: 'rainbow', img: 'https://images.wikia.com/mlp/images/e/e5/Rainbow_Dash_id.png' },
            { id: 'fluttershy', img: 'https://images.wikia.com/mlp/images/d/d6/Fluttershy_id.png' },
            { id: 'rarity', img: 'https://images.wikia.com/mlp/images/d/d1/Rarity_id.png' },
            { id: 'applejack', img: 'https://images.wikia.com/mlp/images/d/d8/Applejack_id.png' }
        ];

        const COL_CAPACITY = 4;
        let selectedColIndex = null;
        let columnsData = [];

        function initGame() {
            document.getElementById('win-message').style.display = 'none';
            selectedColIndex = null;
            
            // Chọn ngẫu nhiên 4 nhân vật Pony để chơi mỗi lượt (giúp game vừa sức với bé)
            let activePonies = [...PONIES].sort(() => Math.random() - 0.5).slice(0, 4);
            let pool = [];
            activePonies.forEach(p => {
                for(let i=0; i<COL_CAPACITY; i++) pool.push({ ...p });
            });
            
            // Xáo trộn vị trí các Pony
            pool.sort(() => Math.random() - 0.5);

            // Tạo 4 cột chứa Pony và 2 cột trống để di chuyển (Tổng cộng 6 cột)
            columnsData = [];
            for (let i = 0; i < 4; i++) {
                columnsData.push(pool.slice(i * COL_CAPACITY, (i + 1) * COL_CAPACITY));
            }
            columnsData.push([]); 
            columnsData.push([]); 

            render();
        }

        function render() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            columnsData.forEach((col, index) => {
                const colDiv = document.createElement('div');
                colDiv.className = `column ${selectedColIndex === index ? 'selected' : ''}`;
                colDiv.onclick = () => handleColumnClick(index);

                col.forEach(pony => {
                    const ponyDiv = document.createElement('div');
                    ponyDiv.className = 'pony-card';
                    
                    const img = document.createElement('img');
                    img.src = pony.img;
                    img.alt = pony.id;
                    
                    ponyDiv.appendChild(img);
                    colDiv.appendChild(ponyDiv);
                });

                container.appendChild(colDiv);
            });
        }

        function handleColumnClick(index) {
            if (selectedColIndex === null) {
                if (columnsData[index].length > 0) {
                    selectedColIndex = index;
                }
            } else {
                if (selectedColIndex !== index) {
                    movePony(selectedColIndex, index);
                }
                selectedColIndex = null;
            }
            render();
            checkWin();
        }

        function movePony(fromIdx, toIdx) {
            let fromCol = columnsData[fromIdx];
            let toCol = columnsData[toIdx];

            if (toCol.length >= COL_CAPACITY) return; 

            let topPony = fromCol[fromCol.length - 1];
            
            // Luật xếp: Cột phải trống HOẶC Pony trên cùng phải trùng hình với Pony định thả vào
            if (toCol.length === 0 || toCol[toCol.length - 1].id === topPony.id) {
                toCol.push(fromCol.pop());
            }
        }

        function checkWin() {
            let isWin = columnsData.every(col => {
                if (col.length === 0) return true;
                if (col.length === COL_CAPACITY) {
                    return col.every(pony => pony.id === col[0].id);
                }
                return false;
            });

            if (isWin) {
                setTimeout(() => {
                    document.getElementById('win-message').style.display = 'block';
                }, 300);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        initGame();
    </script>
</body>
</html>
