<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xếp chỗ cho MyLittlePony</title>
    <link rel="manifest" href="manifest.json">
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ffe6f2, #ffb3d9, #b3e6ff);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        h1 { color: #ff4d94; text-shadow: 2px 2px white; margin-bottom: 5px; font-size: 24px; text-align: center; font-weight: bold; }
        
        #game-container { 
            display: flex; 
            gap: 12px; 
            justify-content: center; 
            flex-wrap: wrap; 
            margin-top: 25px; 
            max-width: 500px; 
        }
        
        /* BIẾN KHUNG THÀNH LỌ THỦY TINH ĐÁNG YÊU */
        .column {
            position: relative;
            width: 76px;
            height: 290px;
            background: linear-gradient(to bottom, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.8));
            border: 4px solid #ffb3d9;
            /* Bo góc sâu bên dưới tạo hình cái lọ/hũ thủy tinh */
            border-radius: 12px 12px 30px 30px; 
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding: 15px 5px 20px 5px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: inset 0 0 15px rgba(255,255,255,0.6), 0 6px 12px rgba(255, 77, 148, 0.15);
        }
        
        /* Hiệu ứng cổ lọ và chiếc nơ hồng xinh xắn */
        .column::before {
            content: "💝";
            position: absolute;
            top: -16px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            z-index: 2;
        }
        .column::after {
            content: "";
            position: absolute;
            top: -6px;
            width: 50px;
            height: 8px;
            background: #ff99cc;
            border-radius: 4px;
            border: 2px solid #ffb3d9;
        }

        /* KHI BÉ CHỌN: Lọ phát sáng và lắc lư nhẹ dễ thương */
        .column.selected { 
            border-color: #ff3399; 
            background: linear-gradient(to bottom, rgba(255, 230, 242, 0.6), rgba(255, 204, 230, 0.9));
            box-shadow: 0 0 20px rgba(255, 51, 153, 0.6); 
            animation: tilt 0.5s infinite alternate ease-in-out;
        }
        
        @keyframes tilt {
            0% { transform: translateY(-5px) rotate(-2deg); }
            100% { transform: translateY(-5px) rotate(2deg); }
        }

        /* Ô TRÒN CHỨA ICON PONY */
        .pony-card {
            width: 56px;
            height: 56px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 3px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            overflow: hidden;
            border: 2px solid #ffccd5;
            z-index: 1;
        }
        .pony-card svg {
            width: 82%;
            height: 82%;
        }
        
        @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        /* BẢNG CHÚC MỪNG CHIẾN THẮNG */
        #win-message {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 40px rgba(255, 77, 148, 0.3); text-align: center; z-index: 10;
            width: 85%; max-width: 350px;
            border: 4px solid #ffccd5;
        }
        #win-message h2 { color: #ff4d94; margin-top: 0; font-size: 26px; }
        
        button {
            background: linear-gradient(135deg, #ff66b2, #ff3399); 
            color: white; border: none; padding: 12px 30px;
            font-size: 18px; border-radius: 25px; cursor: pointer; margin-top: 15px;
            box-shadow: 0 5px #b30059; font-weight: bold;
            transition: all 0.1s;
        }
        button:active { box-shadow: 0 2px #b30059; transform: translateY(3px); }
    </style>
</head>
<body>

    <h1>🦄 Pony Sắp Xếp Đáng Yêu 🦄</h1>
    <div id="game-container"></div>

    <div id="win-message">
        <h2>🎉 Bé giỏi quá! 🎉</h2>
        <p>Các bạn My Little Pony đã về đúng chiếc lọ kẹo rồi!</p>
        <button onclick="initGame()">Chơi tiếp nha</button>
    </div>

    <script>
        const PONIES = [
            { 
                id: 'twilight', 
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#D19FEF"/><path d="M20,30 Q50,5 80,30 Q65,65 50,85 Q35,65 20,30" fill="#283593"/><path d="M35,20 Q50,5 65,20 Q55,50 50,75" fill="#E91E63"/><polygon points="50,15 53,25 62,25 55,31 57,40 50,35 43,40 45,31 38,25 47,25" fill="#FFFFFF"/></svg>`
            },
            { 
                id: 'pinkie', 
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFB7D5"/><path d="M20,40 Q50,-10 80,40 Q95,70 50,90 Q5,70 20,40" fill="#FF4081"/><circle cx="40" cy="35" r="8" fill="#FF4081"/><circle cx="60" cy="45" r="10" fill="#FF4081"/><circle cx="35" cy="60" r="7" fill="#FF4081"/></svg>`
            },
            { 
                id: 'rainbow', 
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#B3E5FC"/><path d="M15,40 Q50,0 85,40 L75,80 L25,80 Z" fill="#FF1744"/><path d="M25,45 Q50,15 75,45 L70,80 L30,80 Z" fill="#FFFF00"/><path d="M35,50 Q50,30 65,50 L60,80 L40,80 Z" fill="#00E676"/><path d="M45,55 Q50,45 55,55 L53,80 L47,80 Z" fill="#2979FF"/><polygon points="30,55 45,55 35,70 50,70 40,90 60,65 48,65" fill="#FFFFFF"/></svg>`
            },
            { 
                id: 'fluttershy', 
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFF59D"/><path d="M15,30 Q50,5 85,40 Q70,95 30,85" fill="#F48FB1"/><path d="M40,50 Q60,35 70,55" fill="none" stroke="#F48FB1" stroke-width="5" stroke-linecap="round"/><circle cx="35" cy="45" r="5" fill="#64B5F6"/></svg>`
            },
            { 
                id: 'rarity', 
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#F5F5F5"/><path d="M30,25 Q60,5 80,35 Q60,75 40,55" fill="#4A148C"/><path d="M45,45 Q65,35 55,65" fill="none" stroke="#4A148C" stroke-width="4"/><polygon points="50,10 55,25 45,25" fill="#D19FEF" stroke="#4A148C" stroke-width="2"/></svg>`
            },
            { 
                id: 'applejack', 
                svg: `<svg viewBox="0 0 100 100"><circle cx="50" cy="50" r="45" fill="#FFB74D"/><path d="M10,40 Q50,20 90,40 L80,50 L20,50 Z" fill="#F57C00"/><path d="M25,40 L25,15 Q50,5 75,15 L75,40 Z" fill="#A1887F"/><circle cx="35" cy="70" r="7" fill="#D50000"/><circle cx="65" cy="70" r="7" fill="#D50000"/><circle cx="50" cy="82" r="7" fill="#D50000"/></svg>`
            }
        ];

        const COL_CAPACITY = 4;
        let selectedColIndex = null;
        let columnsData = [];

        function initGame() {
            document.getElementById('win-message').style.display = 'none';
            selectedColIndex = null;
            
            let activePonies = [...PONIES].sort(() => Math.random() - 0.5).slice(0, 4);
            let pool = [];
            activePonies.forEach(p => {
                for(let i=0; i<COL_CAPACITY; i++) pool.push({ ...p });
            });
            
            pool.sort(() => Math.random() - 0.5);

            columnsData = [];
            for (let i = 0; i < 4; i++) {
                columnsData.push(pool.slice(i * COL_CAPACITY, (i + 1) * COL_CAPACITY));
            }
            columnsData.push([]); 
            columnsData.push([]); 

            render();
        }

        function render() {
            const container = document.getElementById('game-container');
            container.innerHTML = '';

            columnsData.forEach((col, index) => {
                const colDiv = document.createElement('div');
                colDiv.className = `column ${selectedColIndex === index ? 'selected' : ''}`;
                colDiv.onclick = () => handleColumnClick(index);

                col.forEach(pony => {
                    const ponyDiv = document.createElement('div');
                    ponyDiv.className = 'pony-card';
                    ponyDiv.innerHTML = pony.svg;
                    colDiv.appendChild(ponyDiv);
                });

                container.appendChild(colDiv);
            });
        }

        function handleColumnClick(index) {
            if (selectedColIndex === null) {
                if (columnsData[index].length > 0) {
                    selectedColIndex = index;
                }
            } else {
                if (selectedColIndex !== index) {
                    movePony(selectedColIndex, index);
                }
                selectedColIndex = null;
            }
            render();
            checkWin();
        }

        function movePony(fromIdx, toIdx) {
            let fromCol = columnsData[fromIdx];
            let toCol = columnsData[toIdx];

            if (toCol.length >= COL_CAPACITY) return; 

            let topPony = fromCol[fromCol.length - 1];
            
            if (toCol.length === 0 || toCol[toCol.length - 1].id === topPony.id) {
                toCol.push(fromCol.pop());
            }
        }

        function checkWin() {
            let isWin = columnsData.every(col => {
                if (col.length === 0) return true;
                if (col.length === COL_CAPACITY) {
                    return col.every(pony => pony.id === col[0].id);
                }
                return false;
            });

            if (isWin) {
                setTimeout(() => {
                    document.getElementById('win-message').style.display = 'block';
                }, 300);
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }

        initGame();
    </script>
</body>
</html>
